[program:uudp-queue]
process_name=%(program_name)s
command=php /var/www/html/uudp/artisan queue:work --sleep=3 --tries=3 --timeout=120
directory=/var/www/html/uudp
autostart=true
autorestart=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/html/uudp/storage/logs/queue-worker.log
